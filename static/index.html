<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Manager - Morgane</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap");

      :root {
        color-scheme: light;
        --bg: #f5f2ea;
        --panel: rgba(255, 255, 255, 0.92);
        --ink: #1d1e20;
        --muted: #5f6368;
        --line: #e3dfd3;
        --accent: #0f7a75;
        --accent-2: #0f4b7a;
        --shadow: 0 24px 50px rgba(17, 24, 39, 0.08);
        --priority-1: #dc2626;
        --priority-2: #f59e0b;
        --priority-3: #10b981;
        --alert-urgent: #fef2f2;
        --alert-urgent-border: #fecaca;
        --alert-soon: #fffbeb;
        --alert-soon-border: #fde68a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 20% 10%, #fff6db 0%, transparent 45%),
          radial-gradient(circle at 90% 0%, #e0f0ff 0%, transparent 45%),
          var(--bg);
        min-height: 100vh;
      }

      /* Login Page */
      .login-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .login-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 40px;
        box-shadow: var(--shadow);
        max-width: 400px;
        width: 100%;
      }

      .login-card h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .login-card p {
        margin: 0 0 24px;
        color: var(--muted);
      }

      /* Common Styles */
      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 48px 20px 72px;
      }

      .hero {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 32px;
      }

      h1 {
        font-size: clamp(28px, 3vw, 42px);
        margin: 0 0 8px;
      }

      h2 {
        font-size: 20px;
        margin: 0 0 20px;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: var(--shadow);
        margin-bottom: 24px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 500;
      }

      input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        font-family: inherit;
        font-size: 14px;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        background: linear-gradient(130deg, #0f7a75, #0f4b7a);
        color: white;
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 12px 30px rgba(15, 122, 117, 0.2);
        font-family: inherit;
        font-size: 14px;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.secondary {
        background: transparent;
        color: var(--ink);
        box-shadow: none;
      }

      button.danger {
        background: linear-gradient(130deg, #dc2626, #b91c1c);
        box-shadow: 0 12px 30px rgba(220, 38, 38, 0.2);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .hidden {
        display: none !important;
      }

      .error {
        color: #dc2626;
        font-size: 13px;
        margin-top: 8px;
      }

      /* Salon Grid */
      .salon-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      .salon-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 20px;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .salon-card:hover {
        transform: translateY(-2px);
      }

      .salon-year {
        color: var(--accent);
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .salon-name {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .salon-desc {
        color: var(--muted);
        font-size: 13px;
      }

      /* Task List */
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .task-item {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        position: relative;
      }

      .task-item.completed {
        opacity: 0.6;
      }

      .task-item.has-deadline {
        border-left: 4px solid var(--line);
      }

      .task-item.alert-urgent {
        background: var(--alert-urgent);
        border-left-color: var(--priority-1);
      }

      .task-item.alert-soon {
        background: var(--alert-soon);
        border-left-color: var(--priority-2);
      }

      .task-header {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 8px;
      }

      .task-checkbox {
        margin-top: 2px;
        cursor: pointer;
      }

      .task-content {
        flex: 1;
      }

      .task-name {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .task-name.completed {
        text-decoration: line-through;
      }

      .task-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
      }

      .priority-badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
      }

      .priority-1 {
        background: #fee2e2;
        color: var(--priority-1);
      }

      .priority-2 {
        background: #fef3c7;
        color: #d97706;
      }

      .priority-3 {
        background: #d1fae5;
        color: #059669;
      }

      .deadline-badge {
        font-size: 11px;
        font-weight: 500;
      }

      .subtasks {
        margin-left: 32px;
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .subtask-item {
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        font-size: 13px;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        font-size: 14px;
      }

      .breadcrumb a {
        color: var(--accent);
        text-decoration: none;
      }

      .breadcrumb a:hover {
        text-decoration: underline;
      }

      .breadcrumb-sep {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .salon-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
      <div class="login-card">
        <h1>Event Manager</h1>
        <p>Connecte-toi pour gérer tes salons</p>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Identifiant</label>
            <input type="text" id="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Code d'accès</label>
            <input type="password" id="password" required autocomplete="current-password" />
          </div>
          <div class="error hidden" id="loginError"></div>
          <button type="submit" style="width: 100%; margin-top: 16px;">Se connecter</button>
        </form>
      </div>
    </div>

    <!-- Salons List Page -->
    <div id="salonsPage" class="page hidden">
      <header class="hero">
        <div>
          <h1>Mes Salons</h1>
          <p class="subtitle">Organisez vos événements par année</p>
        </div>
        <div class="actions">
          <button id="newSalonBtn">+ Nouveau Salon</button>
          <button id="logoutBtn" class="secondary">Déconnexion</button>
        </div>
      </header>

      <div id="salonsList" class="salon-grid"></div>
    </div>

    <!-- Salon Detail Page -->
    <div id="salonDetailPage" class="page hidden">
      <div class="breadcrumb">
        <a href="#" id="backToSalons">Salons</a>
        <span class="breadcrumb-sep">/</span>
        <span id="currentSalonName"></span>
      </div>

      <header class="hero">
        <div>
          <h1 id="salonTitle"></h1>
          <p class="subtitle" id="salonSubtitle"></p>
        </div>
        <div class="actions">
          <button id="newTaskBtn">+ Nouvelle Tâche</button>
          <button id="editSalonBtn" class="secondary">Éditer le salon</button>
        </div>
      </header>

      <div id="tasksList" class="task-list"></div>
    </div>

    <!-- Salon Form Page -->
    <div id="salonFormPage" class="page hidden">
      <div class="breadcrumb">
        <a href="#" id="cancelSalonForm">Salons</a>
        <span class="breadcrumb-sep">/</span>
        <span id="salonFormTitle">Nouveau Salon</span>
      </div>

      <div class="card">
        <h2 id="salonFormHeading">Créer un nouveau salon</h2>
        <form id="salonForm">
          <div class="form-group">
            <label for="salonName">Nom du salon *</label>
            <input type="text" id="salonName" required />
          </div>
          <div class="form-group">
            <label for="salonYear">Année *</label>
            <input type="number" id="salonYear" required min="2020" max="2100" />
          </div>
          <div class="form-group">
            <label for="salonDescription">Description</label>
            <textarea id="salonDescription"></textarea>
          </div>
          <div class="actions">
            <button type="submit">Enregistrer</button>
            <button type="button" class="secondary" id="cancelSalonFormBtn">Annuler</button>
            <button type="button" class="danger hidden" id="deleteSalonBtn">Supprimer</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Task Form Page -->
    <div id="taskFormPage" class="page hidden">
      <div class="breadcrumb">
        <a href="#" id="backToSalonFromTask">Salon</a>
        <span class="breadcrumb-sep">/</span>
        <span id="taskFormTitle">Nouvelle Tâche</span>
      </div>

      <div class="card">
        <h2 id="taskFormHeading">Créer une nouvelle tâche</h2>
        <form id="taskForm">
          <div class="form-group">
            <label for="taskName">Nom de la tâche *</label>
            <input type="text" id="taskName" required />
          </div>
          <div class="form-group">
            <label for="parentTask">Tâche parente (optionnel - pour créer une sous-tâche)</label>
            <select id="parentTask">
              <option value="">Aucune (tâche principale)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskPriority">Priorité *</label>
            <select id="taskPriority" required>
              <option value="1">1 - Urgent</option>
              <option value="2" selected>2 - Normal</option>
              <option value="3">3 - Faible</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDeadline">Date limite (optionnel)</label>
            <input type="date" id="taskDeadline" />
          </div>
          <div class="form-group">
            <label for="taskDescription">Description</label>
            <textarea id="taskDescription"></textarea>
          </div>
          <div class="form-group">
            <label for="taskUrls">URLs (une par ligne)</label>
            <textarea id="taskUrls" placeholder="https://example.com&#10;https://another-link.com"></textarea>
          </div>
          <div class="actions">
            <button type="submit">Enregistrer</button>
            <button type="button" class="secondary" id="cancelTaskFormBtn">Annuler</button>
            <button type="button" class="danger hidden" id="deleteTaskBtn">Supprimer</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
